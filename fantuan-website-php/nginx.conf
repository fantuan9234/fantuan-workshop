# 饭团工坊官网 Nginx 配置
# 适用于宝塔面板

# 1. 站点根目录指向 /www/wwwroot/你的域名/fantuan-website-php
# 2. PHP 版本选择 PHP-84
# 3. 伪静态设置（如下）

location / {
    index index.php;
    try_files $uri $uri/ /index.php?$args;
}

location ~ \.php$ {
    fastcgi_pass unix:/tmp/php-cgi-84.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

location ~ /\.(ht|git|env|sqlite|db) {
    deny all;
}

# 禁止访问敏感目录
location ^~ /backend/ {
    deny all;
}
location ^~ /data/ {
    deny all;
}
location ^~ /vendor/ {
    deny all;
}

# 浏览器缓存
location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}